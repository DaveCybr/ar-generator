<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Viewer</title>
  <script src="/libs/aframe.min.js"></script>
  <script src="/libs/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; z-index: 9999;
      font-family: 'Inter', system-ui, sans-serif; color: #fff;
      gap: 12px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 2px solid #3ecf8e;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 14px; color: #707070; font-family: 'Inter', system-ui, sans-serif; }
    #progress-bar-wrap {
      width: 200px; height: 3px;
      background: #2a2a2a; border-radius: 9999px;
      display: none;
    }
    #progress-bar {
      height: 100%; width: 0%;
      background: #3ecf8e; border-radius: 9999px;
      transition: width 0.2s;
    }

    .a-enter-vr, .a-enter-ar, [class*="a-enter-vr"], [class*="a-enter-ar"] {
      display: none !important;
    }

    #error {
      display: none;
      position: fixed; inset: 0;
      flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; z-index: 9999;
      font-family: system-ui, sans-serif;
      text-align: center; padding: 24px; gap: 12px;
    }
    #error p { color: #f87171; font-size: 15px; font-family: 'Inter', system-ui, sans-serif; }
    #error button {
      margin-top: 8px; padding: 8px 20px;
      background: #3ecf8e; color: #171717;
      border: none; border-radius: 6px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      transition: background 0.15s ease;
    }
    #error button:hover { background: #24b47e; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">Memuat AR viewer...</p>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div id="error">
    <p id="error-text">Gagal memuat AR.</p>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>

  <script>
    const params      = new URLSearchParams(window.location.search)
    const mindFileUrl = params.get('mind')
    const targetsJson = params.get('targets')
    const projectSlug = params.get('slug')
    const sbUrl       = params.get('sbUrl')
    const sbKey       = params.get('sbKey')

    // Increment scan count saat viewer dibuka
    if (projectSlug && sbUrl && sbKey) {
      fetch(`${sbUrl}/rest/v1/rpc/increment_scan_count`, {
        method: 'POST',
        headers: { 'apikey': sbKey, 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_slug: projectSlug }),
      }).catch(() => {})
    }

    const loadingEl    = document.getElementById('loading')
    const loadingText  = document.getElementById('loading-text')
    const progressWrap = document.getElementById('progress-bar-wrap')
    const progressBar  = document.getElementById('progress-bar')
    const errorEl      = document.getElementById('error')
    const errorText    = document.getElementById('error-text')

    function showError(msg) {
      loadingEl.style.display = 'none'
      errorText.textContent = msg || 'Gagal memuat AR.'
      errorEl.style.display = 'flex'
    }

    function setProgress(pct) {
      progressWrap.style.display = 'block'
      progressBar.style.width = pct + '%'
    }

    async function fetchBlob(url) {
      const res = await fetch(url)
      if (!res.ok) throw new Error('Gagal mengunduh konten AR')
      const contentLength = res.headers.get('Content-Length')
      if (!contentLength) {
        const blob = await res.blob()
        return URL.createObjectURL(blob)
      }
      const total = parseInt(contentLength, 10)
      const reader = res.body.getReader()
      const chunks = []
      let received = 0
      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        chunks.push(value)
        received += value.length
        setProgress(Math.round((received / total) * 100))
      }
      const blob = new Blob(chunks, { type: res.headers.get('Content-Type') || 'video/mp4' })
      return URL.createObjectURL(blob)
    }

    async function init() {
      if (!mindFileUrl || !targetsJson) { showError('Parameter AR tidak lengkap.'); return }

      let targets
      try { targets = JSON.parse(targetsJson) } catch { showError('Data AR tidak valid.'); return }

      try {
        // Download semua video sebagai blob
        const resolved = []
        const videos = targets.filter(t => t.type === 'video')
        for (let i = 0; i < videos.length; i++) {
          loadingText.textContent = `Mengunduh video ${i + 1}/${videos.length}...`
          progressWrap.style.display = 'block'
          const blobUrl = await fetchBlob(videos[i].content)
          resolved.push({ originalUrl: videos[i].content, blobUrl })
        }

        const resolvedTargets = targets.map(t => ({
          ...t,
          resolvedContent: t.type === 'video'
            ? resolved.find(r => r.originalUrl === t.content)?.blobUrl || t.content
            : t.content,
        }))

        loadingText.textContent = 'Memuat AR...'
        progressWrap.style.display = 'none'
        buildScene(resolvedTargets)
      } catch (err) {
        showError(err.message || 'Terjadi kesalahan.')
      }
    }

    function buildVideoTarget(scene, targetEntity, resolvedContent, index) {
      const video = document.createElement('video')
      video.id = `ar-video-${index}`
      video.src = resolvedContent
      video.loop = true
      video.muted = true
      video.setAttribute('playsinline', '')
      video.setAttribute('preload', 'auto')

      const assets = scene.querySelector('a-assets')
      assets.appendChild(video)

      const placeholder = document.createElement('a-entity')
      targetEntity.appendChild(placeholder)

      let rafId = null
      let threeMesh = null

      function buildMesh() {
        const THREE = window.THREE || AFRAME.THREE
        const texture = new THREE.VideoTexture(video)
        texture.minFilter = THREE.LinearFilter
        texture.magFilter = THREE.LinearFilter
        texture.format = THREE.RGBAFormat
        const w = video.videoWidth || 16
        const h = video.videoHeight || 9
        const geometry = new THREE.PlaneGeometry(1, h / w)
        const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
        threeMesh = new THREE.Mesh(geometry, material)
        placeholder.object3D.add(threeMesh)
      }

      scene.addEventListener('loaded', () => {
        if (video.videoWidth) buildMesh()
        else video.addEventListener('loadedmetadata', buildMesh, { once: true })
      })

      function updateTexture() {
        if (threeMesh?.material.map) threeMesh.material.map.needsUpdate = true
        if (!video.paused) rafId = requestAnimationFrame(updateTexture)
      }

      targetEntity.addEventListener('targetFound', () => {
        video.muted = false
        video.play()
          .then(() => { if (rafId) cancelAnimationFrame(rafId); updateTexture() })
          .catch(() => { video.muted = true; video.play().then(() => { if (rafId) cancelAnimationFrame(rafId); updateTexture() }).catch(() => {}) })
      })
      targetEntity.addEventListener('targetLost', () => {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null }
        video.pause()
      })
    }

    function buildScene(resolvedTargets) {
      const scene = document.createElement('a-scene')
      scene.setAttribute('mindar-image',
        `imageTargetSrc: ${mindFileUrl}; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes; filterMinCF: 0.001; filterBeta: 1; warmupTolerance: 5; missTolerance: 5;`)
      scene.setAttribute('color-space', 'sRGB')
      scene.setAttribute('renderer', `colorManagement: true; physicallyCorrectLights: true; antialias: true; pixelRatio: ${Math.min(window.devicePixelRatio, 3)}`)
      scene.setAttribute('vr-mode-ui', 'enabled: false')
      scene.setAttribute('device-orientation-permission-ui', 'enabled: false')

      const assets = document.createElement('a-assets')
      assets.setAttribute('timeout', '30000')
      scene.appendChild(assets)

      const camera = document.createElement('a-camera')
      camera.setAttribute('position', '0 0 0')
      camera.setAttribute('look-controls', 'enabled: false')
      scene.appendChild(camera)

      resolvedTargets.forEach((t, i) => {
        const targetEntity = document.createElement('a-entity')
        targetEntity.setAttribute('mindar-image-target', `targetIndex: ${i}`)

        if (t.type === 'video') {
          buildVideoTarget(scene, targetEntity, t.resolvedContent, i)
        } else {
          const model = document.createElement('a-gltf-model')
          model.setAttribute('src', t.resolvedContent)
          model.setAttribute('scale', '0.5 0.5 0.5')
          model.setAttribute('position', '0 0 0')
          targetEntity.appendChild(model)
        }

        scene.appendChild(targetEntity)
      })

      scene.addEventListener('loaded', () => { loadingEl.style.display = 'none' })
      scene.addEventListener('arReady', () => { loadingEl.style.display = 'none' })

      document.body.appendChild(scene)
    }

    init()
  </script>
</body>
</html>
