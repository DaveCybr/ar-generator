<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Viewer</title>
  <script src="/libs/aframe.min.js"></script>
  <script src="/libs/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; z-index: 9999;
      font-family: system-ui, sans-serif; color: #fff;
      gap: 12px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 2px solid #7c3aed;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 14px; color: #9ca3af; }
    #progress-bar-wrap {
      width: 200px; height: 3px;
      background: #374151; border-radius: 9999px;
      display: none;
    }
    #progress-bar {
      height: 100%; width: 0%;
      background: #7c3aed; border-radius: 9999px;
      transition: width 0.2s;
    }

    .a-enter-vr, .a-enter-ar, [class*="a-enter-vr"], [class*="a-enter-ar"] {
      display: none !important;
    }

    #error {
      display: none;
      position: fixed; inset: 0;
      flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; z-index: 9999;
      font-family: system-ui, sans-serif;
      text-align: center; padding: 24px; gap: 12px;
    }
    #error p { color: #f87171; font-size: 15px; }
    #error button {
      margin-top: 8px; padding: 8px 20px;
      background: #7c3aed; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">Memuat AR viewer...</p>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div id="error">
    <p id="error-text">Gagal memuat AR.</p>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>

  <script>
    const params      = new URLSearchParams(window.location.search)
    const mindFileUrl = params.get('mind')
    const contentUrl  = params.get('content')
    const contentType = params.get('type')

    const loadingEl    = document.getElementById('loading')
    const loadingText  = document.getElementById('loading-text')
    const progressWrap = document.getElementById('progress-bar-wrap')
    const progressBar  = document.getElementById('progress-bar')
    const errorEl      = document.getElementById('error')
    const errorText    = document.getElementById('error-text')

    function showError(msg) {
      loadingEl.style.display = 'none'
      errorText.textContent = msg || 'Gagal memuat AR.'
      errorEl.style.display = 'flex'
    }

    function setProgress(pct) {
      progressWrap.style.display = 'block'
      progressBar.style.width = pct + '%'
    }

    async function fetchBlob(url) {
      const res = await fetch(url)
      if (!res.ok) throw new Error('Gagal mengunduh konten AR')

      const contentLength = res.headers.get('Content-Length')
      if (!contentLength) {
        const blob = await res.blob()
        return URL.createObjectURL(blob)
      }

      const total  = parseInt(contentLength, 10)
      const reader = res.body.getReader()
      const chunks = []
      let received = 0

      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        chunks.push(value)
        received += value.length
        setProgress(Math.round((received / total) * 100))
      }

      const blob = new Blob(chunks, { type: res.headers.get('Content-Type') || 'video/mp4' })
      return URL.createObjectURL(blob)
    }

    async function init() {
      if (!mindFileUrl || !contentUrl || !contentType) {
        showError('Parameter AR tidak lengkap.')
        return
      }

      try {
        let resolvedContentUrl = contentUrl

        if (contentType === 'video') {
          loadingText.textContent = 'Mengunduh video...'
          resolvedContentUrl = await fetchBlob(contentUrl)
          setProgress(100)
        }

        loadingText.textContent = 'Memuat AR...'
        progressWrap.style.display = 'none'

        buildScene(resolvedContentUrl)
      } catch (err) {
        showError(err.message || 'Terjadi kesalahan.')
      }
    }

    function buildScene(resolvedContentUrl) {
      const isVideo = contentType === 'video'

      const scene = document.createElement('a-scene')
      scene.setAttribute('mindar-image',
        `imageTargetSrc: ${mindFileUrl}; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes; filterMinCF: 0.001; filterBeta: 1; warmupTolerance: 5; missTolerance: 5;`)
      scene.setAttribute('color-space', 'sRGB')
      scene.setAttribute('renderer', `colorManagement: true; physicallyCorrectLights: true; antialias: true; pixelRatio: ${Math.min(window.devicePixelRatio, 3)}`)
      scene.setAttribute('vr-mode-ui', 'enabled: false')
      scene.setAttribute('device-orientation-permission-ui', 'enabled: false')

      const assets = document.createElement('a-assets')
      assets.setAttribute('timeout', '30000')

      let video = null

      if (isVideo) {
        video = document.createElement('video')
        video.id = 'ar-content'
        video.src = resolvedContentUrl
        video.loop = true
        video.muted = true
        video.setAttribute('playsinline', '')
        video.setAttribute('preload', 'auto')

        video.addEventListener('loadedmetadata', () => console.log('[VIDEO] loadedmetadata — size:', video.videoWidth, 'x', video.videoHeight))
        video.addEventListener('canplay',        () => console.log('[VIDEO] canplay — readyState:', video.readyState))
        video.addEventListener('canplaythrough', () => console.log('[VIDEO] canplaythrough'))
        video.addEventListener('play',           () => console.log('[VIDEO] play event fired'))
        video.addEventListener('pause',          () => console.log('[VIDEO] pause event fired'))
        video.addEventListener('error',          (e) => console.error('[VIDEO] error:', e))

        assets.appendChild(video)
        console.log('[VIDEO] element created, src:', resolvedContentUrl.slice(0, 60))
      }

      scene.appendChild(assets)

      const camera = document.createElement('a-camera')
      camera.setAttribute('position', '0 0 0')
      camera.setAttribute('look-controls', 'enabled: false')
      scene.appendChild(camera)

      const target = document.createElement('a-entity')
      target.setAttribute('mindar-image-target', 'targetIndex: 0')

      if (isVideo) {
        // Pakai Three.js VideoTexture langsung — bypass A-Frame material system
        const placeholder = document.createElement('a-entity')
        placeholder.setAttribute('position', '0 0 0')
        target.appendChild(placeholder)

        let rafId = null
        let threeMesh = null

        function buildMesh() {
          const THREE = window.THREE || AFRAME.THREE
          const texture = new THREE.VideoTexture(video)
          texture.minFilter = THREE.LinearFilter
          texture.magFilter = THREE.LinearFilter
          texture.format = THREE.RGBAFormat

          const w = video.videoWidth  || 16
          const h = video.videoHeight || 9
          const aspect = h / w  // height relative to width=1

          const geometry = new THREE.PlaneGeometry(1, aspect)
          const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
          threeMesh = new THREE.Mesh(geometry, material)
          threeMesh.position.y = 0.1

          placeholder.object3D.add(threeMesh)
          console.log(`[THREE] mesh added — ${w}x${h} → aspect ${aspect.toFixed(4)}`)
        }

        scene.addEventListener('loaded', () => {
          if (video.videoWidth) {
            buildMesh()
          } else {
            video.addEventListener('loadedmetadata', buildMesh, { once: true })
          }
        })

        function updateTexture() {
          if (threeMesh && threeMesh.material.map) {
            threeMesh.material.map.needsUpdate = true
          }
          if (!video.paused) rafId = requestAnimationFrame(updateTexture)
        }

        target.addEventListener('targetFound', () => {
          console.log('[AR] targetFound — video.readyState:', video.readyState, '| paused:', video.paused)
          video.muted = false
          video.play()
            .then(() => {
              console.log('[AR] play() resolved OK — starting texture loop')
              if (rafId) cancelAnimationFrame(rafId)
              updateTexture()
            })
            .catch(() => {
              // Fallback: play muted jika browser reject unmuted play
              console.warn('[AR] unmuted play rejected, retrying muted')
              video.muted = true
              video.play()
                .then(() => { if (rafId) cancelAnimationFrame(rafId); updateTexture() })
                .catch((e) => console.error('[AR] muted play also rejected:', e.message))
            })
        })
        target.addEventListener('targetLost', () => {
          console.log('[AR] targetLost')
          if (rafId) { cancelAnimationFrame(rafId); rafId = null }
          video.pause()
        })
      } else {
        const model = document.createElement('a-gltf-model')
        model.setAttribute('src', resolvedContentUrl)
        model.setAttribute('scale', '0.5 0.5 0.5')
        model.setAttribute('position', '0 0 0')
        target.appendChild(model)
      }

      scene.appendChild(target)

      scene.addEventListener('loaded', () => {
        console.log('[SCENE] loaded')
        loadingEl.style.display = 'none'
      })
      scene.addEventListener('arReady', () => {
        console.log('[SCENE] arReady')
        loadingEl.style.display = 'none'
      })

      document.body.appendChild(scene)
    }

    init()
  </script>
</body>
</html>
